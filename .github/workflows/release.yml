name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run compile

      # Build the installable .vsix (filename embeds name + version).
      - name: Package extension
        run: npx --yes @vscode/vsce package --out "tmux-reconnect-${GITHUB_REF_NAME#v}.vsix"

      # Attach the .vsix to the GitHub Release for this tag.
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.vsix'
          generate_release_notes: true
